<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 LOGIN BOX (ADDED WRAPPER) -->
<div id="loginBox">
   <h1 class="main-title">⚖️ AI Land Litigation System</h1>
<div class="login-container">
    <h2> 🔒Login </h2>

    <input type="text" id="username" placeholder="👤Username">
    <input type="password" id="password" placeholder="🔐Password">

    <button onclick="login()">Login</button>

    <p style="text-align:center;">
        Don't have an account? 
        <a href="#" onclick="showSignup(); return false;">Sign Up</a>
    </p>

</div>
</div>

<!-- 📝 SIGNUP BOX (MOVED INSIDE BODY) -->
<div id="signupBox" style="display:none;" class="login-container">

    <h2>📝Sign Up</h2>

    <input type="text" id="newUsername" placeholder="👤Enter Username" required>
    <input type="password" id="newPassword" placeholder="🔐Enter Password" required>

    <button type="button" onclick="signup()">Register</button>

    <p style="text-align:center;">
        Already have an account? 
        <a href="#" onclick="showLogin(); return false;">Login</a>
    </p>

</div>

<script>
    // 🔐 LOGIN FUNCTION (UPDATED)
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let savedUser = localStorage.getItem("username");
    let savedPass = localStorage.getItem("password");

    // ✅ Check both admin AND registered user
    if (
        (user === "admin" && pass === "1234") ||   // default admin
        (user === savedUser && pass === savedPass) // new signup user
    ) {
        window.location.href = "index.html";
    } else {
        alert("❌ Invalid Login");
    }
}
</script>

<!-- 🔐 KEYBOARD CONTROL (UNCHANGED) -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    let username = document.getElementById("username");
    let password = document.getElementById("password");
    
    username.focus();

    username.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            e.preventDefault();
            password.focus();
        }
    });

    password.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            e.preventDefault();
            login();
        }
    });

});

</script>

<!-- 🔄 ADD THIS NEW SCRIPT (SIGNUP FEATURE) -->
<script>

// 🔄 SWITCH FORMS
function showSignup() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("signupBox").style.display = "block";
}

function showLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("signupBox").style.display = "none";
}

// 📝 SIGNUP FUNCTION
function signup() {
    let user = document.getElementById("newUsername").value;
    let pass = document.getElementById("newPassword").value;

    if (user === "" || pass === "") {
        alert("Please fill all fields");
        return;
    }

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    alert("✅ Registered successfully!");

    showLogin();
}
// ⌨️ ENTER KEY FOR SIGNUP
document.addEventListener("DOMContentLoaded", function () {

    let newUser = document.getElementById("newUsername");
    let newPass = document.getElementById("newPassword");

    if (newUser && newPass) {

        // 👉 Enter in username → move to password
        newUser.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                newPass.focus();
            }
        });

        // 👉 Enter in password → register
        newPass.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                signup();   // 🔥 CALL YOUR FUNCTION
            }
        });

    }

});
</script>

</body>
</html>
